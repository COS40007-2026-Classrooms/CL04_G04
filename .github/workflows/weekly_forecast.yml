name: Weekly Fuel Forecast & Retrain

on:
  schedule:
    # Every Wednesday at 11:30 UTC (9:30pm AEST / 10:30pm AEDT)
    # Fair Fuel API refreshes ~9am UTC Tuesday, so Wednesday night is ideal
    - cron: '30 11 * * 3'

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:
    inputs:
      force_retrain:
        description: 'Force retrain even if threshold fails'
        required: false
        default: 'false'
        type: boolean
      mape_threshold:
        description: 'MAPE threshold % (default 3.0)'
        required: false
        default: '3.0'
      dry_run:
        description: 'Dry run (no model writes)'
        required: false
        default: 'false'
        type: boolean

env:
  PYTHON_VERSION: '3.11'
  MAPE_THRESHOLD: '3.0'    # <- edit to tighten/loosen accuracy gat
  DA_THRESHOLD:   '55.0'   # <- directional accuracy minimum %
  MAE_THRESHOLD:  '6.0'    # <- max MAE in cents per litre

jobs:
  forecast_and_retrain:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      #  Checkout 
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GAVS_TOKEN }}

      #  Python setup 
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pandas numpy scikit-learn h5py pdfplumber matplotlib scipy

      #  Ensure data/models/reports dirs exist 
      - name: Create directories
        run: |
          mkdir -p data models reports

      #  Run retraining pipeline (fetches live prices, checks accuracy, retrains)
      - name: Run retraining pipeline
        id: retrain
        env:
          SERVO_SAVER_API_KEY: ${{ secrets.SERVO_SAVER_API_KEY }}
        run: |
          EXTRA_ARGS=""
          if [ "${{ github.event.inputs.force_retrain }}" = "true" ]; then
            EXTRA_ARGS="$EXTRA_ARGS --force-retrain"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            EXTRA_ARGS="$EXTRA_ARGS --dry-run"
          fi

          MAPE="${{ github.event.inputs.mape_threshold || env.MAPE_THRESHOLD }}"

          python code/retrain_pipeline.py \
            --mape-threshold "$MAPE" \
            --da-threshold "${{ env.DA_THRESHOLD }}" \
            --mae-threshold "${{ env.MAE_THRESHOLD }}" \
            $EXTRA_ARGS
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      #  Run suburb-level forecast 
      - name: Run suburb forecast
        env:
          SERVO_SAVER_API_KEY: ${{ secrets.SERVO_SAVER_API_KEY }}
        run: |
          python code/suburbfinalModel.py

      #  Read metrics 
      - name: Parse pipeline metrics
        id: metrics
        run: |
          if [ -f data/pipeline_metrics.json ]; then
            MAPE=$(python3 -c "
          import json
          d = json.load(open('data/pipeline_metrics.json'))
          agg = d.get('accuracy',{}).get('aggregate',{})
          print(agg.get('mape_pct','N/A'))
          ")
            STATUS=$(python3 -c "
          import json
          d = json.load(open('data/pipeline_metrics.json'))
          print('passing' if d.get('threshold_passed') else 'failing')
          ")
            echo "mape=$MAPE" >> $GITHUB_OUTPUT
            echo "status=$STATUS" >> $GITHUB_OUTPUT
          fi

      #  Commit updated outputs 
      - name: Commit forecast outputs
        env:
          GITHUB_TOKEN: ${{ secrets.GAVS_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add reports/price_forecast.json          || true
          git add reports/price_forecast_chart.png     || true
          git add reports/price_forecast_report.txt    || true
          git add reports/price_training_metrics.csv   || true
          git add reports/suburb_price_forecast.csv    || true
          git add reports/suburb_price_forecast.json   || true
          git add reports/suburb_price_report.txt      || true
          git add data/forecast_history.csv            || true
          git add data/actuals_history.csv             || true
          git add data/postcode_calibration.csv        || true
          git add data/pipeline_metrics.json           || true
          git add data/badge_summary.json              || true

          # Only commit model weights if retrain succeeded
          if [ -f data/pipeline_metrics.json ]; then
            RETRAINED=$(python3 -c "
          import json
          d = json.load(open('data/pipeline_metrics.json'))
          print('true' if d.get('retrain_success') else 'false')
          ")
            if [ "$RETRAINED" = "true" ]; then
              git add models/*.h5 || true
              echo "Model weights updated in commit"
            fi
          fi

          git diff --cached --quiet || \
            git commit -m "chore: weekly forecast $(date +'%Y-%m-%d') [MAPE=${{ steps.metrics.outputs.mape }}] [status=${{ steps.metrics.outputs.status }}]"

          git push origin HEAD:${{ github.ref_name }}

      #  Job summary 
      - name: Write job summary
        if: always()
        run: |
          echo "## VIC Fuel Forecast - $(date +'%Y-%m-%d')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f data/pipeline_metrics.json ]; then
            python3 << 'EOF'
          import json, os
          d = json.load(open('data/pipeline_metrics.json'))
          agg = d.get('accuracy',{}).get('aggregate',{})
          passed = d.get('threshold_passed', False)
          retrained = d.get('retrain_success', False)

          status_icon  = "YES:)" if passed   else "FAIL :("
          retrain_icon = "RETRAINED" if retrained else "NO TRAIN"

          lines = [
              f"### {status_icon} Accuracy Gate: {'PASSED' if passed else 'FAILED'}",
              "",
              "| Metric | Value | Threshold | Status |",
              "|--------|-------|-----------|--------|",
          ]
          thresh = d.get('thresholds', {})
          checks = d.get('accuracy',{}).get('threshold_checks',{})
          if agg:
              lines.append(f"| MAPE | {agg.get('mape_pct','N/A')}% | <={thresh.get('mape_max','?')}% | {'YES' if checks.get('mape') else 'NO'} |")
              lines.append(f"| DA   | {agg.get('da_pct','N/A')}% | >={thresh.get('da_min','?')}% | {'YES' if checks.get('da') else 'NO'} |")
              lines.append(f"| MAE  | {agg.get('mae_cpl','N/A')} cpl | <={thresh.get('mae_max_cpl','?')} cpl | {'YES' if checks.get('mae') else 'NO'} |")

          lines += ["", f"### {retrain_icon} Retrain: {'Models updated' if retrained else 'Models unchanged'}"]

          fuels = d.get('accuracy',{}).get('fuels',{})
          if fuels:
              lines += [
                  "", "### Per-fuel accuracy",
                  "| Fuel | Forecast cpl | Actual cpl | Error | APE% |",
                  "|------|-------------|------------|-------|------|"
              ]
              for fuel, m in fuels.items():
                  lines.append(
                      f"| {fuel.upper()} | {m.get('forecast_cpl','?')} "
                      f"| {m.get('actual_cpl','?')} "
                      f"| {m.get('error_cpl',0):+.1f} "
                      f"| {m.get('ape_pct',0):.2f}% |"
                  )

          with open(os.environ['GITHUB_STEP_SUMMARY'], 'a') as f:
              f.write('\n'.join(lines) + '\n')
          EOF
          fi

      #  Alert on threshold failure 
      - name: Alert on threshold failure
        if: steps.retrain.outputs.exit_code == '1'
        run: |
          echo "::warning title=Accuracy threshold not met::Model MAPE exceeded threshold. Models were NOT updated. Check data/pipeline_metrics.json for details."
